name: Build and Push Docker Images

on:
  push:
    branches:
      - main      # или твоя основная ветка, например master     
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout кода
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. Настройка Docker Buildx (для мультиплатформенной сборки)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # 3. Логин в DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 4. Сборка и пуш образа Strapi
      - name: Build and push Strapi image
        uses: docker/build-push-action@v4
        with:
          context: ./strapi
          file: ./strapi/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fliben-strapi:latest
            ${{ secrets.DOCKER_USERNAME }}/fliben-strapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 5. Сборка и пуш образа Next.js
      - name: Build and push Next.js image
        uses: docker/build-push-action@v4
        with:
          context: ./nextjs
          file: ./nextjs/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fliben-nextjs:latest
            ${{ secrets.DOCKER_USERNAME }}/fliben-nextjs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 6. (Опционально) Вывод информации о собранных образах
      - name: Image info
        run: |
          echo "Strapi image: ${{ secrets.DOCKER_USERNAME }}/fliben-strapi:latest"
          echo "Next.js image: ${{ secrets.DOCKER_USERNAME }}/fliben-nextjs:latest"
          echo "Commit SHA: ${{ github.sha }}"